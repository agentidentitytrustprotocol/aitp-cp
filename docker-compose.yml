services:
  postgres:
    image: postgres:16-alpine
    container_name: aitp-control-plane-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aitp_control_plane
    ports:
      - "5432:5432"
    volumes:
      - aitp-control-plane-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aitp_control_plane"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Integration-test DB on a separate port
  postgres-test:
    image: postgres:16-alpine
    container_name: aitp-control-plane-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aitp_control_plane_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aitp_control_plane_test"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  aitp-control-plane-pgdata:
